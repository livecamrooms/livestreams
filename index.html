<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON TRINITY · Live Streams</title>
  <style>
    /*! NEON TRINITY - PURPLE · GOLD · GREEN */
    :root {
      --bg: #05020a;
      --bg2: #0a0515;
      --bg3: #100a20;
      --card: #070310;
      --neon-purple: #c000ff;
      --neon-gold: #ffd700;
      --neon-green: #00ff88;
      --glow-purple: #c000ffaa;
      --glow-gold: #ffd700aa;
      --glow-green: #00ff88aa;
      --text: #f2eaff;
      --muted: #8a7aaf;
      --border: #2a1a4a;
      --live: #f43f5e;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background-image: radial-gradient(ellipse at 10% 20%, #c000ff08 0%, transparent 60%),
                        radial-gradient(ellipse at 90% 80%, #00ff8808 0%, transparent 60%);
    }
    @keyframes trioPulse {
      0% { text-shadow: 0 0 2px var(--neon-purple); }
      33% { text-shadow: 0 0 8px var(--neon-gold); }
      66% { text-shadow: 0 0 4px var(--neon-green); }
      100% { text-shadow: 0 0 2px var(--neon-purple); }
    }
    @keyframes borderRainbow {
      0% { border-color: var(--neon-purple); }
      50% { border-color: var(--neon-gold); }
      100% { border-color: var(--neon-green); }
    }
    @keyframes ld {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
    @keyframes sh {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .hdr {
      background: rgba(5, 2, 10, .92);
      backdrop-filter: blur(16px);
      border-bottom: 2px solid var(--neon-purple);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 0 12px var(--glow-purple);
      animation: borderRainbow 4s infinite;
    }
    .hdr-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-gold), var(--neon-green));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      animation: trioPulse 3s infinite;
    }
    .hdr-live {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(244, 63, 94, .12);
      border: 1px solid var(--live);
      color: var(--live);
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      box-shadow: 0 0 4px var(--glow-purple);
    }
    .hdr-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: ld 1.4s infinite;
      box-shadow: 0 0 6px var(--live);
    }
    .hdr-sp { flex: 1; }
    .hdr-count {
      color: var(--neon-green);
      font-size: .8rem;
      text-shadow: 0 0 4px var(--glow-green);
    }
    .sec-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .sec-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-purple), transparent);
      box-shadow: 0 0 6px var(--glow-purple);
    }
    .sec-title {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .main {
      max-width: 1420px;
      margin: 0 auto;
      padding: 22px 16px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-c {
      flex: 1;
      min-width: 120px;
      background: var(--card);
      border: 1px solid var(--neon-gold);
      border-radius: 12px;
      padding: 16px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: all .2s;
      box-shadow: 0 0 6px rgba(255, 215, 0, .2);
    }
    .stat-c:hover {
      box-shadow: 0 0 20px var(--glow-gold);
      border-color: var(--neon-green);
      transform: scale(1.02);
    }
    .stat-n {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stat-l {
      font-size: .7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 3px;
    }
    .fbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: inset 0 0 6px var(--glow-purple);
    }
    .fb {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 16px;
      border-radius: 20px;
      font-size: .78rem;
      cursor: pointer;
      transition: all .18s;
      font-weight: 600;
    }
    .fb:hover, .fb.on {
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-gold));
      border-color: transparent;
      color: #000;
      box-shadow: 0 0 12px var(--glow-purple);
    }
    .f-srch {
      flex: 1;
      min-width: 160px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: .8rem;
      outline: none;
    }
    .f-srch:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 0 2px var(--glow-green);
    }
    #g {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(228px, 1fr));
      gap: 16px;
    }
    .c {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all .2s;
      position: relative;
      will-change: transform;
    }
    .c::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--neon-purple)00, var(--neon-green)00);
      transition: all .3s;
      pointer-events: none;
    }
    .c:hover {
      border-color: var(--neon-gold);
      transform: translateY(-4px);
      box-shadow: 0 8px 28px var(--glow-gold);
    }
    .c:hover::before {
      background: linear-gradient(135deg, var(--neon-purple)08, var(--neon-green)08);
    }
    .c a {
      text-decoration: none;
      color: inherit;
      position: relative;
      z-index: 1;
    }
    .c-th {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg3);
    }
    .c-th img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
      will-change: transform;
    }
    .c:hover .c-th img { transform: scale(1.06); }
    .b-lv {
      position: absolute;
      top: 7px;
      left: 7px;
      background: var(--live);
      color: #fff;
      font-size: .63rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      z-index: 2;
      box-shadow: 0 0 6px var(--live);
    }
    .b-top {
      position: absolute;
      top: 7px;
      right: 7px;
      background: linear-gradient(90deg, var(--neon-gold), var(--neon-green));
      color: #000;
      font-size: .6rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      z-index: 2;
      box-shadow: 0 0 6px var(--glow-gold);
    }
    .b-vc {
      position: absolute;
      bottom: 7px;
      right: 7px;
      background: rgba(0, 0, 0, .8);
      color: var(--neon-green);
      font-size: .72rem;
      padding: 2px 8px;
      border-radius: 4px;
      z-index: 2;
      font-family: monospace;
      box-shadow: 0 0 4px var(--glow-green);
    }
    .c-bd {
      padding: 10px 13px 8px;
      position: relative;
      z-index: 1;
    }
    .c-nm {
      font-size: .88rem;
      font-weight: 700;
      margin-bottom: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .c-tg {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .ctg {
      background: var(--bg3);
      color: var(--muted);
      font-size: .65rem;
      padding: 1px 7px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .c-btn {
      display: block;
      text-align: center;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-gold));
      color: #000;
      font-size: .78rem;
      font-weight: 800;
      padding: 9px;
      margin: 8px 12px 12px;
      border-radius: 8px;
      text-decoration: none;
      transition: all .2s;
      z-index: 1;
      box-shadow: 0 0 8px var(--glow-purple);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .c-btn:hover {
      opacity: .9;
      box-shadow: 0 0 20px var(--glow-purple);
      transform: scale(1.02);
    }
    .sk {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .sk-i {
      aspect-ratio: 16/9;
      background: linear-gradient(90deg, var(--card) 25%, var(--bg3) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: sh 1.5s infinite;
    }
    .sk-l {
      height: 11px;
      margin: 10px 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--card) 25%, var(--bg3) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: sh 1.5s infinite;
    }
    .sk-l.s { width: 50%; }
    .no {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }
    .no h3 {
      font-size: 1.1rem;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    footer {
      text-align: center;
      padding: 22px;
      color: var(--muted);
      font-size: .75rem;
      border-top: 2px solid;
      border-image: linear-gradient(90deg, var(--neon-purple), var(--neon-gold), var(--neon-green)) 1;
      margin-top: 36px;
    }
    @media (max-width: 600px) {
      #g { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stats-row { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-logo">⚡ NEON TRINITY</div>
    <div class="hdr-live"><span class="hdr-dot"></span>LIVE STREAMS</div>
    <div class="hdr-sp"></div>
    <span class="hdr-count" id="hc">Loading...</span>
  </div>
  <div class="main">
    <div class="stats-row">
      <div class="stat-c"><div class="stat-n" id="s1">-</div><div class="stat-l">Live Rooms</div></div>
      <div class="stat-c"><div class="stat-n" id="s2">-</div><div class="stat-l">Watching</div></div>
      <div class="stat-c"><div class="stat-n" id="s3">90s</div><div class="stat-l">Refresh</div></div>
      <div class="stat-c"><div class="stat-n" id="s4">-</div><div class="stat-l">Top Viewers</div></div>
    </div>
    <div class="sec-hdr"><div class="sec-line"></div><div class="sec-title">✨ Live Rooms</div><div class="sec-line"></div></div>
    <div class="fbar">
      <button class="fb on" data-filter="all">🌟 All</button>
      <button class="fb" data-filter="female">👧 Girls</button>
      <button class="fb" data-filter="male">👦 Boys</button>
      <button class="fb" data-filter="couple">💑 Couples</button>
      <button class="fb" data-filter="trans">⚡ Trans</button>
      <input class="f-srch" id="fi" placeholder="Search performers..." type="text">
    </div>
    <div id="g"></div>
  </div>
  <footer>NEON TRINITY • 18+ Adults Only • © <span id="fy"></span></footer>

  <script>
    (function(){
      const $g = document.getElementById('g');
      const $s1 = document.getElementById('s1');
      const $s2 = document.getElementById('s2');
      const $s4 = document.getElementById('s4');
      const $hc = document.getElementById('hc');
      const $s3 = document.getElementById('s3');
      const $fi = document.getElementById('fi');
      const WM = 'T2CSW';
      let allRooms = [], currentGender = 'all', refreshSec = 90, timer;
      const placeholderImg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 360 270'%3E%3Crect width='360' height='270' fill='%23070310'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23c000ff' font-size='16' font-family='monospace'%3ELIVE%3C/text%3E%3C/svg%3E";
      const escapeHTML = str => String(str).replace(/[&<>]/g, function(m){
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
      });
      const formatNum = n => n >= 1000 ? (n/1000).toFixed(1) + 'k' : String(n);
      const getRoomLink = u => 'https://chaturbate.com/' + u + '/?tour=Limj&campaign=' + WM + '&track=default';
      
      function renderCards(rooms){
        if(!rooms.length){
          $g.innerHTML = '<div class="no"><h3>No Rooms Found</h3><p>Try a different filter or search</p></div>';
          return;
        }
        let html = '';
        for(let i = 0; i < rooms.length; i++){
          const r = rooms[i];
          const link = getRoomLink(r.username);
          const tags = (r.tags || []).slice(0,3).map(t => `<span class="ctg">${escapeHTML(t)}</span>`).join('');
          const topBadge = i < 3 ? '<span class="b-top">⭐ #' + (i+1) + '</span>' : '';
          const viewers = formatNum(r.num_users || 0);
          const imgSrc = r.image_url_360x270 || r.image_url || '';
          html += `<div class="c"><a href="${link}" target="_blank" rel="noopener"><div class="c-th"><img loading="lazy" decoding="async" src="${imgSrc}" alt="${escapeHTML(r.username)}" onerror="this.src='${placeholderImg}'"><span class="b-lv">LIVE</span>${topBadge}<span class="b-vc">👁 ${viewers}</span></div><div class="c-bd"><div class="c-nm">${escapeHTML(r.username)}</div><div class="c-tg">${tags}</div></div></a><a class="c-btn" href="${link}" target="_blank" rel="noopener">▶ Watch Free Now</a></div>`;
        }
        $g.innerHTML = html;
      }
      
      function filterAndRender(){
        const query = $fi.value.toLowerCase();
        let filtered = allRooms.filter(r => {
          if(currentGender !== 'all' && r.gender !== currentGender) return false;
          if(query && !r.username.toLowerCase().includes(query) && !(r.tags || []).some(t => t.includes(query))) return false;
          return true;
        });
        renderCards(filtered);
      }
      
      function updateStats(rooms, totalViewers, topViewers){
        $s1.textContent = rooms.length;
        $s2.textContent = formatNum(totalViewers);
        $s4.textContent = formatNum(topViewers);
        $hc.textContent = rooms.length + ' rooms online';
      }
      
      function fetchRooms(){
        fetch('https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=' + WM + '&client_ip=request_ip&format=json&limit=90&offset=0')
          .then(res => res.json())
          .then(data => {
            const list = data.results || [];
            list.sort((a,b) => (b.num_users || 0) - (a.num_users || 0));
            allRooms = list;
            const totalViewers = list.reduce((s,r) => s + (r.num_users || 0), 0);
            const topViewers = list[0] ? list[0].num_users || 0 : 0;
            updateStats(list, totalViewers, topViewers);
            filterAndRender();
            refreshSec = 90;
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
              if(refreshSec > 0){
                refreshSec--;
                $s3.textContent = refreshSec + 's';
              } else {
                fetchRooms();
              }
            }, 1000);
          })
          .catch(() => {
            $g.innerHTML = '<div class="no"><h3>Connection Error</h3><p>Please refresh</p></div>';
          });
      }
      
      function initEvents(){
        document.querySelectorAll('.fb').forEach(btn => {
          btn.addEventListener('click', function(){
            document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
            this.classList.add('on');
            currentGender = this.getAttribute('data-filter');
            filterAndRender();
          });
        });
        $fi.addEventListener('input', () => filterAndRender());
      }
      
      function showSkeleton(){
        $g.innerHTML = Array(12).fill('<div class="sk"><div class="sk-i"></div><div class="sk-l"></div><div class="sk-l s"></div></div>').join('');
      }
      
      document.getElementById('fy').textContent = new Date().getFullYear();
      showSkeleton();
      fetchRooms();
      initEvents();
    })();
  </script>
</body>
</html>
